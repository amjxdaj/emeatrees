<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roystonia Regia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #d5f4c3, #ffffff);
            margin: 0;
            padding: 0;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: white;
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            flex: 1 0 100%;
        }

        .header a {
            text-decoration: none;
            color: black;
            margin-left: 20px;
        }

        .content {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 10px;
            text-align: center;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-decoration: underline;
        }

        .info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            text-align: left;
            font-size: 18px;
            margin-top: 20px;
        }

        .info div {
            display: flex;
            justify-content: space-between;
        }

        .info div span {
            font-weight: bold;
        }

        .image {
            margin-top: 20px;
        }

        .image img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 10px;
        }

        @media (min-width: 600px) {
            .info {
                grid-template-columns: auto auto;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>EMEA COLLEGE OF ARTS & SCIENCE</h1>
        <div>
            <a href="#">Home</a>
            <a href="#">About</a>
        </div>
    </div>

    <div class="content">
        <div class="title">ROYSTONIA REGIA</div>

        <div class="info">
            <div><span>SCIENTIFIC NAME</span>: ROYSTONIA REGIA</div>
            <div><span>FAMILY</span>: ARECACEAE</div>
            <div><span>COMMON NAME</span>: ROYAL PALM - രാജപ്പന</div>
            <div><span>NATIVE RANGE</span>: TROP. AMERICA</div>
        </div>

        <div class="image">
            <img src="https://via.placeholder.com/200" alt="Roystonia Regia">
        </div>
    </div>
</body>
</html>
